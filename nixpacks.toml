[phases.setup]
nixPkgs = ["python312", "ffmpeg", "libsndfile"]

[phases.install]
cmds = [
  "pip install --upgrade pip setuptools<71",
  "pip install openai-whisper==20240930 --no-build-isolation -q",
  "pip install -r backend/requirements.txt -q"
]

[start]
cmd = "uvicorn backend.main:app --host 0.0.0.0 --port $PORT --workers 1"
